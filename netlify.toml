[build]
  base    = "stayfinder"
  command = "npm run build"
  publish = "stayfinder/dist"

# SPA fallback — all paths fall back to index.html so React handles routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
