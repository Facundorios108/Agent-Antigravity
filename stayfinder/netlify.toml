[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — redirect all routes to index.html so React Router handles them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
